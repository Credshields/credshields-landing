[build]
  command = "node scripts/netlify-build.js"
  publish = "dist"

[[redirects]]
  from = "/realwordassets"
  to = "/realworldassets"
  status = 301

[[redirects]]
  from = "/tos"
  to = "/tos.html"
  status = 200

[[redirects]]
  from = "/tos/"
  to = "/tos.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/tos.html"
  status = 200

[[redirects]]
  from = "/terms/"
  to = "/tos.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/privacy/"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/cookie"
  to = "/privacy.html#cookies"
  status = 301

[[redirects]]
  from = "/cookie/"
  to = "/privacy.html#cookies"
  status = 301

[[redirects]]
  from = "/cookies"
  to = "/privacy.html#cookies"
  status = 301

[[redirects]]
  from = "/cookies/"
  to = "/privacy.html#cookies"
  status = 301

[[redirects]]
  from = "/realwordassets.html"
  to = "/realworldassets"
  status = 301

[[redirects]]
  from = "/stablecoin.html"
  to = "/stablecoins"
  status = 301

[[redirects]]
  from = "/stablecoin"
  to = "/stablecoins"
  status = 301

[[redirects]]
  from = "/web3-cross-chain-bridge-audit.html"
  to = "/crosschainbridge"
  status = 301

[[redirects]]
  from = "/web3-cross-chain-bridge-audit"
  to = "/crosschainbridge"
  status = 301

[[redirects]]
  from = "/web3-defi-protocol-audit.html"
  to = "/dapp-protocol-security"
  status = 301

[[redirects]]
  from = "/web3-defi-protocol-audit"
  to = "/dapp-protocol-security"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Security-Policy = "upgrade-insecure-requests"
    Permissions-Policy = "camera=(), geolocation=(), microphone=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*.v*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*.v*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
