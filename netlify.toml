[[redirects]]
  from = "/realwordassets.html"
  to = "/realworldassets"
  status = 301

[[redirects]]
  from = "/stablecoin.html"
  to = "/stablecoins"
  status = 301

[[redirects]]
  from = "/stablecoin"
  to = "/stablecoins"
  status = 301

[[redirects]]
  from = "/web3-cross-chain-bridge-audit.html"
  to = "/crosschainbridge"
  status = 301

[[redirects]]
  from = "/web3-cross-chain-bridge-audit"
  to = "/crosschainbridge"
